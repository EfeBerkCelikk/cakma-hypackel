<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Player</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* Oyunun açılacağı pencere */
        #game-frame {
            width: 100%;
            height: calc(100% - 40px); /* Alttaki bar için yer bırakıyoruz */
            border: none;
        }

        /* Evrensel Alt Bar */
        #control-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(90deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            box-sizing: border-box;
            color: white;
            z-index: 100;
        }

        .btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
        }

        .btn:hover { background: white; color: black; }
    </style>
</head>
<body>

    <iframe id="game-frame" src=""></iframe>

    <div id="control-bar">
        <div id="display-title">Yükleniyor...</div>
        <div>
            <button class="btn" onclick="location.href='index.html'">🏠 Ana Menü</button>
            <button class="btn" onclick="toggleFS()">🖥️ Tam Ekran</button>
        </div>
    </div>

    <script>
        // URL'den oyun yolunu ve adını al (Örn: play.html?game=games/fnaf2/index.html&title=FNaF2)
        const params = new URLSearchParams(window.location.search);
        const gameUrl = params.get('game');
        const gameTitle = params.get('title');

        if(gameUrl) {
            document.getElementById('game-frame').src = gameUrl;
            document.getElementById('display-title').innerText = gameTitle || "Oyun";
        }

        function toggleFS() {
            let elem = document.documentElement;
            if (!document.fullscreenElement) {
                elem.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
